name: Update GitHub Stats Cards

on:
  schedule:
    - ` # Runs once a year on January 1st
  workflow_dispatch: # Allows you to run it manually

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Stats Card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: 'username=paribesh44&show_icons=true&theme=transparent'
          path: profile/stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate Top Languages Card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: 'username=paribesh44&layout=compact&theme=transparent'
          path: profile/top-langs.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add profile/*.svg
          git commit -m "Update GitHub stats cards" || exit 0
          git push